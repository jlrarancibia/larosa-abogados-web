<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensaje Enviado – La Rosa & Abogados</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    .thanks-section {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
    }
    .thanks-box {
      max-width: 540px;
    }
    .thanks-icon {
      width: 90px; height: 90px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 40px;
      color: var(--navy);
    }
    .thanks-box h1 {
      font-family: var(--font-head);
      font-size: 32px;
      color: var(--navy);
      margin-bottom: 16px;
    }
    .thanks-box p {
      color: var(--gray-text);
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .thanks-box .btn {
      display: inline-flex;
    }
  </style>
  <script>!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','1434745787800154');fbq('track','PageView');</script>
</head>
<body>
<section class="thanks-section">
  <div class="thanks-box">
    <div class="thanks-icon"><i class="fa-solid fa-check"></i></div>
    <h1>Mensaje enviado con éxito</h1>
    <p>Gracias por contactarnos. Hemos recibido tu consulta y nos pondremos en contacto contigo a la brevedad. Tu información es tratada con absoluta confidencialidad.</p>
    <a href="index.html" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
  </div>
</section>
</body>
</html>
